name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Only the latest run per branch/PR needs to finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Offline suite + JET, on every push and PR, across the OSes the package
  # targets. No credentials, so the live S3 tests skip themselves (see
  # test/runtests.jl) and fork PRs run exactly the same checks.
  test:
    name: Offline - ${{ matrix.os }} / Julia ${{ matrix.version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        version: ['1.11', '1']   # 1.11 = minimum compat (needs `public`); 1 = latest stable
        include:
          - os: windows-latest
            version: '1'
          - os: macos-latest
            version: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  # Live S3 round-trips. Runs only on push to main (never on PRs) and draws its
  # credentials from the `aws-tests` environment, which should have a deployment
  # branch rule limiting it to `main` — so the keys are unreachable from any
  # other branch or a PR. Gated behind `test` so a build that's already broken
  # offline never reaches the credentialed step.
  live:
    name: Live S3
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: aws-tests
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1
        env:
          # Resolved from the `aws-tests` environment secrets. AWS_REGION is not
          # secret (it just locates the bucket); the bucket name defaults inside
          # the test script.
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: eu-north-1
